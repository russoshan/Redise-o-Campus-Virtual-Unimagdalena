function Icon({ name, size = 18, className = '', strokeWidth = 1.75, 'aria-label': ariaLabel, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const icons = window.lucide && window.lucide.icons;
    if (!icons) return;
    const key = name.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join('');
    const node = icons[key];
    if (!node) { ref.current.innerHTML = ''; return; }
    const [, attrs, children] = node;
    const svgAttrs = { ...attrs, width: size, height: size, 'stroke-width': strokeWidth,
      'aria-hidden': ariaLabel ? undefined : 'true', role: ariaLabel ? 'img' : undefined };
    const ba = (a) => Object.entries(a).filter(([,v]) => v !== undefined && v !== null).map(([k,v]) => `${k}="${v}"`).join(' ');
    const inner = children.map(([t,a]) => `<${t} ${ba(a)} />`).join('');
    ref.current.innerHTML = `<svg ${ba(svgAttrs)}>${ariaLabel ? `<title>${ariaLabel}</title>` : ''}${inner}</svg>`;
  }, [name, size, strokeWidth, ariaLabel]);
  return <span ref={ref} className={`inline-flex shrink-0 ${className}`} aria-label={ariaLabel} {...rest} />;
}

function Button({ variant='primary', size='md', className='', children, ...props }) {
  const base = 'inline-flex items-center justify-center gap-2 font-medium transition-colors rounded-md border focus-visible:ring-2 focus-visible:ring-brand/40 disabled:opacity-50 disabled:cursor-not-allowed';
  const sizes = { sm:'h-8 px-3 text-[14.5px]', md:'h-10 px-4 text-sm', lg:'h-11 px-5 text-[17px]', icon:'h-9 w-9 p-0' };
  const variants = {
    primary:'bg-brand text-white border-brand hover:bg-brand-dark',
    secondary:'bg-white text-ink-900 border-slate-200 hover:bg-slate-50',
    outline:'bg-transparent text-brand border-brand hover:bg-brand-light',
    'outline-white':'bg-transparent text-white border-white/80 hover:bg-white/10',
    ghost:'bg-transparent text-ink-900 border-transparent hover:bg-black/5',
    danger:'bg-danger text-white border-danger hover:opacity-90',
  };
  return <button className={`${base} ${sizes[size]} ${variants[variant]} ${className}`} {...props}>{children}</button>;
}

function Card({ className='', children, ...rest }) {
  return <div className={`bg-white rounded-xl border border-slate-200/80 shadow-card ${className}`} {...rest}>{children}</div>;
}

}

function Avatar({ initials='?', size=32, className='', tone='brand' }) {

function Checkbox({ checked, onChange, label, id, className='' }) {

  return (

        <input id={_id} type="checkbox" checked={!!checked} onChange={(e)=>onChange&&onChange(e.target.checked)} className="peer absolute inset-0 opacity-0 cursor-pointer" />
        <span className="h-[18px] w-[18px] rounded border border-slate-300 bg-white peer-checked:bg-brand peer-checked:border-brand transition-colors flex items-center justify-center text-white">
          {checked && <Icon name="check" size={12} strokeWidth={3} />}
        </span>
      </span>
      {label && <span className="text-sm text-ink-900 leading-5">{label}</span>}
    </label>
  );
}

function Toggle({ checked, onChange, label, id }) {
  const _id = id || useRef('sw_'+Math.random().toString(36).slice(2)).current;
  return (
    <label htmlFor={_id} className="inline-flex items-center gap-3 cursor-pointer select-none">

      </button>
      {label && <span className="text-sm text-ink-900">{label}</span>}
    </label>
  );
}

function P2Login({ go }) {
  const [email, setEmail] = useState('');
  const [pwd, setPwd] = useState('');
  const [showPwd, setShowPwd] = useState(false);
  const [remember, setRemember] = useState(true);
  const [err, setErr] = useState(false);
  function submit(e) {
    e.preventDefault();
    if (!email.trim() || !pwd.trim()) { setErr(true); return; }
    setErr(false); go('dashboard');
  }
  return (
    <div className="h-full flex flex-col">
      <header className="h-[52px] flex-shrink-0 bg-brand text-white flex items-center px-5">
        <button onClick={() => go('landing')} className="flex items-center gap-2.5 -ml-1 px-1 rounded hover:bg-white/5">
          <img src="assets/logo-unimag.png" alt="Universidad del Magdalena" className="h-9 w-9 object-contain bg-white rounded-md p-0.5" />
          <div className="leading-tight text-left">
            <div className="text-[14.5px] font-semibold">Campus Virtual</div>
            <div className="text-[12px] text-white/70">Universidad del Magdalena</div>
          </div>
        </button>
        <div className="flex-1" />
        <div className="flex items-center gap-1.5 text-[13.5px] text-white/80 font-mono">
          <Icon name="lock" size={12} /><span>campusvirtual.unimagdalena.edu.co</span>
        </div>
      </header>
      <div className="flex-1 flex items-center justify-center px-6 py-8 bg-gradient-to-b from-surface to-white overflow-auto">
        <Card className="w-[380px] !shadow-pop">
          <CardContent className="!p-7">
            <div className="flex flex-col items-center text-center">
              <img src="assets/logo-unimag.png" alt="Universidad del Magdalena" className="h-16 w-16 object-contain" />
              <h1 className="mt-3 text-[20px] font-semibold tracking-tight">Inicio de sesión</h1>
              <p className="text-[14.5px] text-ink-600 mt-1">Accede con tu correo institucional</p>
            </div>
            {err && (
              <div role="alert" className="mt-5 flex items-start gap-2 rounded-md border border-[#f1c6c6] bg-danger-bg px-3 py-2 text-[14.5px] text-danger">
                <Icon name="alert-triangle" size={15} className="mt-0.5" aria-label="Error" />
                <span>Usuario o contraseña incorrectos.</span>
              </div>
            )}
            <form className="mt-5 space-y-3.5" onSubmit={submit}>
              <div>
                <label htmlFor="email" className="block text-[14px] font-medium text-ink-900 mb-1">Correo institucional</label>
                <Input id="email" type="email" icon="mail" placeholder="tunombre@unimagdalena.edu.co" value={email}
                  onChange={(e) => { setEmail(e.target.value); if (err) setErr(false); }} />
              </div>
              <div>
                <label htmlFor="pwd" className="block text-[14px] font-medium text-ink-900 mb-1">Contraseña</label>
                <Input id="pwd" type={showPwd?'text':'password'} icon="lock" placeholder="••••••••" value={pwd}
                  onChange={(e) => { setPwd(e.target.value); if (err) setErr(false); }}
                  iconRight={<button type="button" onClick={() => setShowPwd(s=>!s)} aria-label={showPwd?'Ocultar contraseña':'Mostrar contraseña'}
                    className="h-8 w-8 inline-flex items-center justify-center rounded text-ink-400 hover:text-ink-900 hover:bg-slate-100">
                    <Icon name={showPwd?'eye-off':'eye'} size={16} /></button>} />
              </div>
              <div className="flex items-center justify-between pt-1">
                <Checkbox checked={remember} onChange={setRemember} label="Recordar sesión" />
                <a href="#" className="text-[14px] text-brand hover:underline">¿Olvidaste tu contraseña?</a>
              </div>
              <Button type="submit" size="lg" className="w-full !mt-2">Ingresar</Button>
              <div className="relative my-4 flex items-center text-[13px] uppercase tracking-[0.14em] text-ink-400">
                <span className="flex-1 h-px bg-slate-200" /><span className="px-3">o</span><span className="flex-1 h-px bg-slate-200" />
              </div>
              <Button type="button" variant="outline" size="lg" className="w-full" onClick={() => go('dashboard')}>
                <Icon name="key-round" size={16} /> SSO institucional
              </Button>
            </form>
            <div className="mt-6 text-center text-[14px] text-ink-600">
              ¿Primer ingreso? <a href="#" className="text-brand font-medium hover:underline">Activa tu cuenta</a>
            </div>
          </CardContent>
        </Card>
      </div>
    </div>
  );
}

function Stepper({ step }) {
  const steps = [
    { n:1, label:'Instrucciones' },
    { n:2, label:'Adjuntar archivo' },
    { n:3, label:'Confirmación' },
  ];
  return (
    <ol className="flex items-center w-full" aria-label="Progreso de entrega">
      {steps.map((s, i) => {
        const state = step > s.n ? 'done' : step === s.n ? 'active' : 'pending';
        const circle = state==='done' ? 'bg-brand text-white border-brand' : state==='active' ? 'bg-brand-light text-brand-dark border-brand-accent' : 'bg-white text-ink-400 border-slate-300';
        const text = state==='pending' ? 'text-ink-400' : 'text-ink-900 font-medium';
        const line = step > s.n ? 'bg-brand' : 'bg-slate-200';
        return (
          <li key={s.n} className={`flex items-center ${i===steps.length-1?'':'flex-1'}`}>
            <div className="flex items-center gap-3 min-w-0">
              <div className={`h-8 w-8 rounded-full border-2 flex items-center justify-center font-semibold text-[14.5px] ${circle}`} aria-current={state==='active'?'step':undefined}>
                {state==='done' ? <Icon name="check" size={15} strokeWidth={3} /> : s.n}
              </div>
              <div>
                <div className={`text-[12.5px] uppercase tracking-[0.12em] ${state==='pending'?'text-ink-400':'text-brand'}`}>Paso {s.n}</div>
                <div className={`text-[14px] ${text}`}>{s.label}</div>
              </div>
            </div>
            {i < steps.length-1 && <div className={`flex-1 mx-4 h-[2px] rounded-full ${line}`} />}
          </li>
        );
      })}
    </ol>
  );
}

/* =========================================================================
   11. Calendar — Mayo 2026 (empieza viernes → 4 celdas vacías L-M-M-J)
   ========================================================================= */
const CALENDAR_EVENTS = {
  24: { bg:'#FAEEDA', fg:'#633806', label:'Entrega DCU' },
  26: { bg:'#FCEBEB', fg:'#791F1F', label:'Fecha límite' },
  30: { bg:'#E6F1FB', fg:'#0C447C', label:'Parcial BD II' },
};

function CalendarView() {
  const dayLabels = ['L','M','M','J','V','S','D'];
  // Mayo 2026 empieza viernes → 4 celdas vacías (L, M, M, J)
  const leadingBlanks = 4;
  const totalDays = 31;
  const cells = [
    ...Array.from({ length:leadingBlanks }, () => null),
    ...Array.from({ length:totalDays }, (_, i) => i + 1),
  ];
  // pad trailing to fill the last week row (multiple of 7)
  while (cells.length % 7 !== 0) cells.push(null);
  const today = 24; // visual marker

  return (
    <div className="p-6 max-w-5xl">
      <div className="flex items-end justify-between gap-3 mb-5">
        <div>
          <div className="text-[13px] uppercase tracking-[0.14em] text-ink-400 mb-1">Calendario académico</div>
          <h1 className="text-[23px] font-semibold tracking-tight">Mayo 2026</h1>
          <p className="text-[14px] text-ink-600 mt-0.5">Tus entregas, exámenes y fechas clave del semestre.</p>
        </div>
        <div className="flex items-center gap-2">
          <Button variant="secondary" size="sm" aria-label="Mes anterior"><Icon name="chevron-left" size={15} /></Button>
          <Button variant="secondary" size="sm">Hoy</Button>
          <Button variant="secondary" size="sm" aria-label="Mes siguiente"><Icon name="chevron-right" size={15} /></Button>
        </div>
      </div>

      <Card>
        <CardContent className="!p-0">
          <div
            className="grid border-b border-slate-200 bg-slate-50"
            style={{ gridTemplateColumns:'repeat(7, minmax(0, 1fr))' }}
          >
            {dayLabels.map((d, i) => (
              <div key={i} className="px-3 py-2 text-[13px] uppercase tracking-[0.12em] font-semibold text-ink-600 text-center border-r last:border-r-0 border-slate-200">
                {d}
              </div>
            ))}
          </div>
          <div
            className="grid"
            style={{ gridTemplateColumns:'repeat(7, minmax(0, 1fr))', gridAutoRows:'92px' }}
          >
            {cells.map((d, i) => {
              const ev = d != null ? CALENDAR_EVENTS[d] : null;
              const isToday = d === today;
              const rowLast = i % 7 === 6;
              const isLastRow = i >= cells.length - 7;
              return (
                <div
                  key={i}
                  className={`relative p-2 ${rowLast?'':'border-r'} ${isLastRow?'':'border-b'} border-slate-200 ${d==null?'bg-slate-50/50':'bg-white'}`}
                >
                  {d != null && (
                    <>
                      <div className="flex items-center justify-end">
                        <span className={`inline-flex items-center justify-center h-6 min-w-6 px-1.5 rounded-full text-[13.5px] tabular-nums ${isToday ? 'bg-brand text-white font-semibold' : 'text-ink-900 font-medium'}`}>
                          {d}
                        </span>
                      </div>
                      {ev && (
                        <div
                          className="mt-1.5 rounded px-1.5 py-1 text-[12px] font-semibold leading-tight"
                          style={{ background: ev.bg, color: ev.fg }}
                          title={ev.label}
                        >
                          {ev.label}
                        </div>
                      )}
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </CardContent>
      </Card>

      <div className="mt-4 flex flex-wrap items-center gap-3 text-[13.5px] text-ink-600">
        <span className="font-medium text-ink-900">Leyenda:</span>
        <span className="inline-flex items-center gap-1.5"><span className="h-3 w-3 rounded" style={{ background:'#FAEEDA', border:'1px solid #ecd4a8' }} /> Entrega</span>
        <span className="inline-flex items-center gap-1.5"><span className="h-3 w-3 rounded" style={{ background:'#FCEBEB', border:'1px solid #f1c6c6' }} /> Fecha límite</span>
        <span className="inline-flex items-center gap-1.5"><span className="h-3 w-3 rounded" style={{ background:'#E6F1FB', border:'1px solid #B5D4F4' }} /> Examen</span>
      </div>
    </div>
  );
}

/* =========================================================================
   12. Monitor frame
   ========================================================================= */
function MonitorFrame({ children }) {
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const OUTER_W = 1280 + 32; // inner + padding
    const OUTER_H = 800 + 32 + 30; // inner + padding + stand
    const update = () => {
      const s = Math.min(1, window.innerWidth / OUTER_W, window.innerHeight / OUTER_H);
      setScale(s);
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);
  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column',
                  alignItems:'center', justifyContent:'center', padding:'16px', overflow:'hidden',
                  backgroundImage: 'linear-gradient(rgba(12,68,124,0.55), rgba(12,68,124,0.45)), url(assets/campus.jpg)',
                  backgroundSize: 'cover', backgroundPosition: 'center' }}>
      <div style={{ transform:`scale(${scale})`, transformOrigin:'center center', display:'flex', flexDirection:'column', alignItems:'center' }}>
        <div style={{ background:'#2d2d2d', borderRadius:'14px', padding:'16px',
                      boxShadow:'0 20px 60px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.04)' }}>
          <div style={{ width:'1280px', height:'800px', overflow:'hidden', borderRadius:'4px', position:'relative', background:'#000' }}>
            {children}
          </div>
        </div>
        <div style={{ width:'140px', height:'18px', background:'#2d2d2d', borderRadius:'0 0 8px 8px', marginTop:'0px' }} />
        <div style={{ width:'220px', height:'10px', background:'#3a3a3a', borderRadius:'4px', marginTop:'2px' }} />
      </div>
    </div>
  );
}

/* =========================================================================
   13. App router
   ========================================================================= */
function App() {
  const [screen, setScreen] = useState('landing');
  const [ctx, setCtx] = useState({});
  const [notifs, setNotifs] = useState(NOTIFICATIONS);
  const unreadCount = notifs.filter(n => !n.read).length;

  function go(next, extra = {}) {
    setCtx(prev => ({ ...prev, ...extra }));
    setScreen(next);
  }

  let content;
  if (screen === 'landing') {
    content = <P1Landing go={go} />;
  } else if (screen === 'login') {
    content = <P2Login go={go} />;
  } else {
    let inner;
    switch (screen) {
      case 'dashboard': inner = <P3Dashboard go={go} />; break;
      case 'course':    inner = <P4Course go={go} ctx={ctx} />; break;
      case 'submit':    inner = <P5Submit go={go} />; break;
      case 'grades':    inner = <P6Grades go={go} />; break;
      case 'profile':   inner = <P7Profile go={go} ctx={ctx} notifs={notifs} setNotifs={setNotifs} />; break;
      case 'calendar':  inner = <CalendarView />; break;
      default:          inner = <P3Dashboard go={go} />;
    }
    content = <AppShell screen={screen} ctx={ctx} go={go} unreadCount={unreadCount}>{inner}</AppShell>;
  }

  return (
    <MonitorFrame>
      <div className="cv-screen">{content}</div>
    </MonitorFrame>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
